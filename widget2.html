<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pixel Widget</title>

  <style>
    :root {
      --bg: #f3efe7;
      --panel: #e6dccb;
      --panel-dark: #b7a78a;
      --ink: #4b3f2f;
      --accent: #a68a64;
      --accent-2: #c2b39a;
      --cream: #faf7f1;
      --shadow: #8a7a5f;
    }

    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: monospace;
      background: transparent;
    }

    .widget {
      width: 360px;
      background: var(--bg);
      border: 6px solid var(--ink);
      box-shadow: 8px 8px 0 var(--shadow);
      padding: 12px;
    }

    .title {
      text-align: center;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .photo {
      width: 100%;
      aspect-ratio: 1;
      border: 4px solid var(--panel-dark);
      background: var(--cream);
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .controls {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    button {
      flex: 1;
      padding: 6px;
      background: var(--accent);
      border: 2px solid var(--ink);
      cursor: pointer;
    }

    .status {
      font-size: 10px;
      text-align: center;
      margin-top: 6px;
    }
  </style>
</head>

<body>

<div class="widget">
  <div class="title">🌿 memories</div>

  <div class="photo">
    <img id="img">
  </div>

  <div class="controls">
    <button id="prev">◀</button>
    <button id="next">▶</button>
  </div>

  <div class="status" id="status"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "PASTE",
  authDomain: "slideshow-b78c0.firebaseapp.com",
  projectId: "slideshow-b78c0",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 CHANGE ONLY THIS PER WIDGET
const WIDGET_ID = "main";

// 🔥 PASTE YOUR GOOGLE PHOTOS LINK HERE
const ALBUM_URL = "https://photos.app.goo.gl/cTebSdwRbX3nb1rU7";

// 🔥 FUNCTION URL
const ENDPOINT = "https://us-central1-slideshow-b78c0.cloudfunctions.net/googlePhotosAlbum";

const albumRef = doc(db, "photoAlbums", "mainAlbum");
const widgetRef = doc(db, "photoWidgets", WIDGET_ID);

let photos = [];
let index = 0;

const img = document.getElementById("img");
const status = document.getElementById("status");

function render() {
  if (!photos.length) return;
  index = (index + photos.length) % photos.length;
  img.src = photos[index].url;
}

async function loadAlbum() {
  try {
    status.textContent = "loading...";

    const res = await fetch(`${ENDPOINT}?url=${encodeURIComponent(ALBUM_URL)}`);
    const data = await res.json();

    if (!data.photos || !data.photos.length) {
      throw new Error("no photos");
    }

    await setDoc(albumRef, { photos: data.photos });

    status.textContent = "loaded";
  } catch (e) {
    console.error(e);
    status.textContent = "error loading album";
  }
}

async function ensureWidget() {
  const snap = await getDoc(widgetRef);
  if (!snap.exists()) {
    await setDoc(widgetRef, { currentIndex: 0 });
  }
}

document.getElementById("prev").onclick = () => updateDoc(widgetRef, { currentIndex: index - 1 });
document.getElementById("next").onclick = () => updateDoc(widgetRef, { currentIndex: index + 1 });

onSnapshot(albumRef, snap => {
  if (!snap.exists()) return;
  photos = snap.data().photos || [];
  render();
});

onSnapshot(widgetRef, snap => {
  if (!snap.exists()) return;
  index = snap.data().currentIndex || 0;
  render();
});

await ensureWidget();
await loadAlbum();
</script>

</body>
</html>
