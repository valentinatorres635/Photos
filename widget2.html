<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pastel Green Photo Widget</title>

<style>
  :root {
    --bg: #eef5ee;
    --panel: #dfeee2;
    --panel-dark: #9bb89f;
    --ink: #3f5c45;
    --accent: #b7d3b0;
    --accent-2: #cfe5c9;
    --cream: #f7fbf7;
    --shadow: #7c9a83;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: "Courier New", monospace;
    background: transparent;
    color: var(--ink);
  }

  .widget {
    width: 360px;
    background: var(--bg);
    border: 6px solid var(--ink);
    box-shadow: 8px 8px 0 var(--shadow);
    padding: 14px;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .title {
    font-weight: bold;
    font-size: 15px;
  }

  button {
    background: var(--accent);
    border: 3px solid var(--ink);
    padding: 6px 10px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--shadow);
  }

  button:active {
    transform: translate(3px,3px);
    box-shadow: none;
  }

  .photo-wrap {
    width: 100%;
    aspect-ratio: 1;
    background: var(--cream);
    border: 4px solid var(--panel-dark);
    overflow: hidden;
  }

  img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .caption {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 12px;
  }

  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 8px;
  }

  .settings {
    display: none;
    margin-top: 10px;
    background: var(--panel);
    padding: 10px;
    border: 3px solid var(--panel-dark);
  }

  .settings.open {
    display: block;
  }

  input {
    width: 100%;
    padding: 6px;
    margin-bottom: 8px;
    border: 2px solid var(--ink);
    background: var(--cream);
  }

</style>
</head>

<body>

<div class="widget">

  <div class="topbar">
    <div class="title">🌿 memories</div>
    <button id="editBtn">edit</button>
  </div>

  <div class="photo-wrap">
    <img id="img" />
  </div>

  <div class="caption">
    <span id="caption">no album</span>
    <span id="counter">0/0</span>
  </div>

  <div class="controls">
    <button id="prev">◀</button>
    <button id="next">▶</button>
  </div>

  <div class="settings" id="settings">
    <input id="albumInput" placeholder="paste google photos link" />
    <button id="load">load album</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, doc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBH-JL6Y9LKN9oYy_lqUao6E_vh-kdawgU",
  authDomain: "slideshow-b78c0.firebaseapp.com",
  projectId: "slideshow-b78c0",
  storageBucket: "slideshow-b78c0.firebasestorage.app",
  messagingSenderId: "50555124539",
  appId: "1:50555124539:web:d240531a52bcd5ea60551e",
  measurementId: "G-7WB37JRGZJ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ref = doc(db, "photoWidgets", "widget2");

const ENDPOINT = "https://us-central1-slideshow-b78c0.cloudfunctions.net/googlePhotosAlbum";

let photos = [];
let index = 0;

const img = document.getElementById("img");
const caption = document.getElementById("caption");
const counter = document.getElementById("counter");

function render(i){
  if(!photos.length) return;
  index = (i+photos.length)%photos.length;
  img.src = photos[index].url;
  caption.textContent = photos[index].caption;
  counter.textContent = `${index+1}/${photos.length}`;
}

async function setIndex(i){
  await updateDoc(ref,{ currentIndex:i });
}

document.getElementById("prev").onclick=()=>setIndex(index-1);
document.getElementById("next").onclick=()=>setIndex(index+1);

document.getElementById("editBtn").onclick=()=>{
  document.getElementById("settings").classList.toggle("open");
};

document.getElementById("load").onclick=async ()=>{
  const url = document.getElementById("albumInput").value;

  const res = await fetch(`${ENDPOINT}?url=${encodeURIComponent(url)}`);
  const data = await res.json();

  await setDoc(ref,{
    photos:data.photos,
    currentIndex:0
  });
};

onSnapshot(ref,(snap)=>{
  const data = snap.data();
  photos = data.photos || [];
  render(data.currentIndex || 0);
});

</script>

</body>
</html>
