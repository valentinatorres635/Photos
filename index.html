<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Google Photos Widget</title>
    <style>
        :root {
            --bg: #eef5ee;
            --panel: #dfeee2;
            --panel-dark: #9bb89f;
            --ink: #3f5c45;
            --accent: #b7d3b0;
            --cream: #f7fbf7;
            --shadow: #7c9a83;
            --error: #9d4b42;
            --success: #5f7f5f;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            width: 100%;
            min-height: 100%;
            background: transparent;
            font-family: "Courier New", Courier, monospace;
            color: var(--ink);
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .widget {
            width: min(100%, 390px);
            background: var(--bg);
            border: 6px solid var(--ink);
            box-shadow: 8px 8px 0 var(--shadow);
            padding: 14px;
        }

        .topbar {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 12px;
        }

        .title {
            font-size: 16px;
            font-weight: 900;
            letter-spacing: 0.5px;
            text-transform: lowercase;
            text-align: center;
        }

        .photo-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            background: var(--cream);
            border: 5px solid var(--panel-dark);
            overflow: hidden;
        }

        #slide {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .empty-state {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            text-align: center;
            padding: 22px;
            font-weight: 900;
            line-height: 1.45;
            background: var(--cream);
            z-index: 2;
        }

        .caption-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            min-height: 24px;
            font-size: 13px;
            font-weight: 900;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
        }

        .pixel-btn {
            background: var(--accent);
            border: 3px solid var(--ink);
            color: var(--ink);
            font-family: inherit;
            font-weight: 900;
            padding: 7px 10px;
            cursor: pointer;
            box-shadow: 3px 3px 0 var(--shadow);
            border-radius: 0;
            transition: all 0.05s ease;
        }

        .pixel-btn:active {
            transform: translate(3px, 3px);
            box-shadow: none;
        }

        .status {
            font-size: 11px;
            line-height: 1.45;
            margin-top: 10px;
            font-weight: 900;
            text-align: center;
        }

        .status.error { color: var(--error); }
        .status.success { color: var(--success); }
        
        .widget-id-badge {
            font-size: 9px;
            text-align: center;
            margin-top: 8px;
            color: var(--panel-dark);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <main class="widget">
        <section class="topbar">
            <div class="title">❦ momentos antes de bloquearnos ❦</div>
        </section>

        <section class="photo-wrap" aria-live="polite">
            <img id="slide" alt="Google Photos album image" />
            <div class="empty-state" id="emptyState">loading album ✿</div>
        </section>

        <section class="caption-row">
            <span id="caption">loading</span>
            <span id="counter">0/0</span>
        </section>

        <section class="controls">
            <button class="pixel-btn" id="prevBtn" type="button">◀ PREV</button>
            <button class="pixel-btn" id="nextBtn" type="button">NEXT ▶</button>
        </section>

        <div class="status" id="status"></div>
        <div class="widget-id-badge" id="widgetIdBadge"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import {
            getFirestore,
            doc,
            getDoc,
            setDoc,
            updateDoc,
            onSnapshot,
            serverTimestamp
        } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

        // IMPORTANT: Change this ID for each widget in Notion!
        // Example: "family-room", "kitchen", "bedroom", "office", etc.
        const WIDGET_ID = "main";  // ← CHANGE THIS FOR EACH WIDGET!

        const firebaseConfig = {
            apiKey: "AIzaSyBH-JL6Y9LKN9oYy_lqUao6E_vh-kdawgU",
            authDomain: "slideshow-b78c0.firebaseapp.com",
            projectId: "slideshow-b78c0",
            storageBucket: "slideshow-b78c0.firebasestorage.app",
            messagingSenderId: "50555124539",
            appId: "1:50555124539:web:d240531a52bcd5ea60551e"
        };

        const ALBUM_ENDPOINT = "https://us-central1-slideshow-b78c0.cloudfunctions.net/googlePhotosAlbum";
        const ALBUM_URL = "https://photos.app.goo.gl/cTebSdwRbX3nb1rU7";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const albumRef = doc(db, "photoAlbums", "mainAlbum");
        const widgetRef = doc(db, "photoWidgets", WIDGET_ID);

        const el = {
            status: document.getElementById("status"),
            slide: document.getElementById("slide"),
            emptyState: document.getElementById("emptyState"),
            caption: document.getElementById("caption"),
            counter: document.getElementById("counter"),
            prevBtn: document.getElementById("prevBtn"),
            nextBtn: document.getElementById("nextBtn"),
            widgetIdBadge: document.getElementById("widgetIdBadge")
        };

        let photos = [];
        let currentIndex = 0;
        let isFetchingAlbum = false;
        let hasTriedRefreshForCurrentImage = false;

        // Show widget ID for debugging
        el.widgetIdBadge.textContent = `widget: ${WIDGET_ID}`;

        function setStatus(message, type = "") {
            el.status.textContent = message;
            el.status.className = type ? `status ${type}` : "status";
            if (message && !type) {
                setTimeout(() => {
                    if (el.status.textContent === message) setStatus("");
                }, 3000);
            }
        }

        function normalizePhotoList(items) {
            return items
                .map((item, index) => ({
                    url: typeof item === "string" ? item : item.url,
                    caption: typeof item === "string"
                        ? `photo ${index + 1}`
                        : item.caption || `photo ${index + 1}`
                }))
                .filter(item => item.url && item.url.startsWith("http") && !item.url.includes("undefined"));
        }

        function safeIndex(index) {
            if (!photos.length) return 0;
            return ((index % photos.length) + photos.length) % photos.length;
        }

        function render() {
            if (!photos.length) {
                el.emptyState.style.display = "grid";
                el.emptyState.textContent = "loading album ✿";
                el.slide.removeAttribute("src");
                el.caption.textContent = "no album loaded";
                el.counter.textContent = "0/0";
                return;
            }

            currentIndex = safeIndex(currentIndex);
            const current = photos[currentIndex];

            if (!current || !current.url) {
                console.error("Invalid current photo:", current);
                return;
            }

            el.emptyState.style.display = "grid";
            el.emptyState.textContent = "loading photo ✿";

            const tester = new Image();
            
            // Clean the URL to ensure it works
            let imageUrl = current.url;
            if (!imageUrl.includes('=')) {
                imageUrl = `${imageUrl}=w1600-h1600-no`;
            }

            tester.onload = () => {
                hasTriedRefreshForCurrentImage = false;
                el.slide.src = imageUrl;
                el.emptyState.style.display = "none";
                el.caption.textContent = current.caption;
                el.counter.textContent = `${currentIndex + 1}/${photos.length}`;
                setStatus("");
            };

            tester.onerror = (error) => {
                console.error("Image load error:", imageUrl, error);
                el.emptyState.style.display = "grid";
                el.emptyState.textContent = "refreshing photo ✿";
                setStatus("photo URL expired — refreshing album...", "error");

                if (!hasTriedRefreshForCurrentImage) {
                    hasTriedRefreshForCurrentImage = true;
                    fetchAndStoreAlbum();
                } else {
                    setStatus("This photo could not load. Try another one.", "error");
                }
            };

            tester.src = imageUrl;
        }

        async function ensureWidgetExists() {
            try {
                const snap = await getDoc(widgetRef);
                if (!snap.exists()) {
                    await setDoc(widgetRef, {
                        currentIndex: 0,
                        createdAt: serverTimestamp(),
                        updatedAt: serverTimestamp(),
                        widgetName: WIDGET_ID
                    });
                    console.log(`Created new widget: ${WIDGET_ID}`);
                }
            } catch (error) {
                console.error("Error ensuring widget exists:", error);
            }
        }

        async function updateSharedIndex(nextIndex) {
            if (!photos.length) return;
            
            const newIndex = safeIndex(nextIndex);
            console.log(`Widget ${WIDGET_ID} changing to photo ${newIndex + 1}`);
            
            try {
                await updateDoc(widgetRef, {
                    currentIndex: newIndex,
                    updatedAt: serverTimestamp(),
                    lastActionBy: "widget_user"
                });
                setStatus(`Changed to photo ${newIndex + 1}`, "success");
            } catch (error) {
                console.error("Error updating index:", error);
                setStatus("Failed to update photo", "error");
            }
        }

        async function fetchAndStoreAlbum() {
            if (isFetchingAlbum) return;
            isFetchingAlbum = true;

            try {
                setStatus("loading fresh album URLs...");
                el.emptyState.style.display = "grid";
                el.emptyState.textContent = "loading album ✿";

                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 20000);

                const response = await fetch(
                    `${ALBUM_ENDPOINT}?url=${encodeURIComponent(ALBUM_URL)}&t=${Date.now()}`,
                    { 
                        signal: controller.signal,
                        headers: { 'Accept': 'application/json' }
                    }
                );

                clearTimeout(timeout);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                
                if (!data.photos || !data.photos.length) {
                    throw new Error("No photos found in album");
                }

                const loadedPhotos = normalizePhotoList(data.photos);
                
                if (!loadedPhotos.length) {
                    throw new Error("No valid photos found");
                }

                await setDoc(albumRef, {
                    photos: loadedPhotos,
                    albumUrl: ALBUM_URL,
                    refreshedAt: Date.now(),
                    updatedAt: serverTimestamp(),
                    totalPhotos: loadedPhotos.length
                }, { merge: true });

                setStatus(`✨ ${loadedPhotos.length} photos loaded ✨`, "success");
            } catch (error) {
                console.error("Fetch error:", error);
                let errorMsg = error.message;
                if (error.name === 'AbortError') {
                    errorMsg = "Request timed out";
                } else if (error.message.includes('Failed to fetch')) {
                    errorMsg = "Cannot reach server";
                }
                setStatus(errorMsg, "error");
                el.emptyState.style.display = "grid";
                el.emptyState.textContent = errorMsg;
            } finally {
                isFetchingAlbum = false;
            }
        }

        // Event listeners for this specific widget
        el.prevBtn.addEventListener("click", () => updateSharedIndex(currentIndex - 1));
        el.nextBtn.addEventListener("click", () => updateSharedIndex(currentIndex + 1));

        // Initialize this widget
        await ensureWidgetExists();

        // Listen for album photo changes
        onSnapshot(albumRef, (snap) => {
            if (!snap.exists()) {
                photos = [];
                render();
                return;
            }
            const newPhotos = normalizePhotoList(snap.data().photos || []);
            if (JSON.stringify(photos) !== JSON.stringify(newPhotos)) {
                photos = newPhotos;
                render();
            }
        });

        // Listen for index changes (syncs across all viewers of this widget)
        onSnapshot(widgetRef, (snap) => {
            if (!snap.exists()) return;
            const data = snap.data();
            const newIndex = Number.isInteger(data.currentIndex) ? data.currentIndex : 0;
            if (newIndex !== currentIndex) {
                console.log(`Widget ${WIDGET_ID} synced to photo ${newIndex + 1}`);
                currentIndex = newIndex;
                render();
            }
        });

        // Initial fetch
        fetchAndStoreAlbum();
    </script>
</body>
</html>
