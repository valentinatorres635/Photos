<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Google Photos Slideshow</title>
  <style>
    :root {
      --bg: #f4ead7;
      --panel: #d9c5aa;
      --panel-dark: #8b6f52;
      --ink: #4d3b2f;
      --accent: #a9b99a;
      --accent-2: #d99f8f;
      --cream: #fff4df;
      --shadow: #5b4434;
      --error: #9d4b42;
      --success: #5f7f5f;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: transparent;
      font-family: "Courier New", Courier, monospace;
      color: var(--ink);
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
    }

    .widget {
      width: min(100%, 390px);
      background: var(--bg);
      border: 6px solid var(--ink);
      box-shadow: 8px 8px 0 var(--shadow);
      padding: 14px;
      image-rendering: pixelated;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .title {
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0.5px;
      text-transform: lowercase;
    }

    .pixel-btn {
      background: var(--accent);
      border: 3px solid var(--ink);
      color: var(--ink);
      font-family: inherit;
      font-weight: 900;
      padding: 7px 10px;
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--shadow);
      border-radius: 0;
    }

    .pixel-btn:active {
      transform: translate(3px, 3px);
      box-shadow: none;
    }

    .pixel-btn.secondary { background: var(--accent-2); }

    .photo-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: var(--cream);
      border: 5px solid var(--panel-dark);
      overflow: hidden;
    }

    .photo-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(45deg, rgba(77,59,47,0.06) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(77,59,47,0.06) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(77,59,47,0.06) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(77,59,47,0.06) 75%);
      background-size: 18px 18px;
      background-position: 0 0, 0 9px, 9px -9px, -9px 0px;
      pointer-events: none;
    }

    #slide {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      image-rendering: auto;
      opacity: 1;
      transition: opacity 220ms ease;
    }

    #slide.fade { opacity: 0; }

    .empty-state {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 22px;
      font-weight: 900;
      line-height: 1.45;
      background: var(--cream);
      z-index: 2;
    }

    .caption-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      min-height: 24px;
      font-size: 13px;
      font-weight: 900;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .settings {
      display: none;
      margin-top: 14px;
      padding: 12px;
      background: var(--panel);
      border: 4px solid var(--panel-dark);
    }

    .settings.open { display: block; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      background: var(--cream);
      border: 3px solid var(--ink);
      color: var(--ink);
      font-family: inherit;
      padding: 8px;
      outline: none;
      margin-bottom: 10px;
    }

    .hint, .tiny {
      font-size: 11px;
      line-height: 1.45;
      margin: 4px 0 10px;
      font-weight: 700;
    }

    .status {
      font-size: 12px;
      line-height: 1.45;
      margin-top: 8px;
      font-weight: 900;
    }

    .status.error { color: var(--error); }
    .status.success { color: var(--success); }
  </style>
</head>
<body>
  <main class="widget">
    <section class="topbar">
      <div class="title">𖦹 pixel memories 𖦹</div>
      <button class="pixel-btn secondary" id="settingsBtn" type="button">edit</button>
    </section>

    <section class="photo-wrap" aria-live="polite">
      <img id="slide" alt="Google Photos slideshow image" />
      <div class="empty-state" id="emptyState">paste your Google Photos shared album link below ✿</div>
    </section>

    <section class="caption-row">
      <span id="caption">no album loaded</span>
      <span id="counter">0/0</span>
    </section>

    <section class="controls">
      <button class="pixel-btn" id="prevBtn" type="button">◀</button>
      <button class="pixel-btn" id="playBtn" type="button">pause</button>
      <button class="pixel-btn" id="nextBtn" type="button">▶</button>
    </section>

    <section class="settings" id="settingsPanel">
      <label for="albumUrl">Google Photos shared album link</label>
      <input id="albumUrl" placeholder="https://photos.app.goo.gl/..." />
      <button class="pixel-btn" id="loadAlbumBtn" type="button">load album</button>

      <p class="hint">This version syncs through Firestore, so everyone sees the same picture.</p>

      <div class="status" id="status"></div>
      <div class="tiny">Only you should use edit. Everyone else will see the synced slideshow.</div>
    </section>
  </main>

  <script>
    document.getElementById("settingsBtn").addEventListener("click", () => {
      document.getElementById("settingsPanel").classList.toggle("open");
    });
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc,
      updateDoc,
      onSnapshot,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

   const firebaseConfig = {
        apiKey: "AIzaSyBH-JL6Y9LKN9oYy_lqUao6E_vh-kdawgU",
        authDomain: "slideshow-b78c0.firebaseapp.com",
        projectId: "slideshow-b78c0",
        storageBucket: "slideshow-b78c0.firebasestorage.app",
        messagingSenderId: "50555124539",
        appId: "1:50555124539:web:d240531a52bcd5ea60551e",
        measurementId: "G-7WB37JRGZJ"
    };

    const ALBUM_ENDPOINT = "PASTE_YOUR_FIREBASE_FUNCTION_URL";
    const WIDGET_ID = "main-widget";
    const SLIDE_MS = 4200;

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const widgetRef = doc(db, "photoWidgets", WIDGET_ID);

    const el = {
      albumUrl: document.getElementById("albumUrl"),
      loadAlbumBtn: document.getElementById("loadAlbumBtn"),
      status: document.getElementById("status"),
      slide: document.getElementById("slide"),
      emptyState: document.getElementById("emptyState"),
      caption: document.getElementById("caption"),
      counter: document.getElementById("counter"),
      prevBtn: document.getElementById("prevBtn"),
      nextBtn: document.getElementById("nextBtn"),
      playBtn: document.getElementById("playBtn")
    };

    let photos = [];
    let index = 0;
    let timer = null;
    let isPlaying = true;
    let applyingRemoteUpdate = false;

    function setStatus(message, type = "") {
      el.status.textContent = message;
      el.status.className = type ? `status ${type}` : "status";
    }

    function normalizePhotoList(items) {
      return items
        .map((item, i) => ({ url: item.url, caption: item.caption || `photo ${i + 1}` }))
        .filter(item => item.url && item.url.startsWith("http"));
    }

    async function ensureDocumentExists() {
      const snap = await getDoc(widgetRef);
      if (!snap.exists()) {
        await setDoc(widgetRef, {
          photos: [],
          currentIndex: 0,
          isPlaying: true,
          albumUrl: "",
          updatedAt: serverTimestamp()
        });
      }
    }

    function render(nextIndex = index) {
      if (!photos.length) {
        el.emptyState.style.display = "grid";
        el.slide.removeAttribute("src");
        el.caption.textContent = "no album loaded";
        el.counter.textContent = "0/0";
        return;
      }

      index = (nextIndex + photos.length) % photos.length;
      const current = photos[index];

      el.emptyState.style.display = "none";
      el.slide.src = current.url;
      el.caption.textContent = current.caption;
      el.counter.textContent = `${index + 1}/${photos.length}`;
    }

    async function pushIndex(nextIndex) {
      if (!photos.length || applyingRemoteUpdate) return;
      const safeIndex = (nextIndex + photos.length) % photos.length;
      await updateDoc(widgetRef, {
        currentIndex: safeIndex,
        updatedAt: serverTimestamp()
      });
    }

    async function pushPlaying(value) {
      await updateDoc(widgetRef, {
        isPlaying: value,
        updatedAt: serverTimestamp()
      });
    }

    function startTimer() {
      stopTimer();
      timer = window.setInterval(() => pushIndex(index + 1), SLIDE_MS);
    }

    function stopTimer() {
      if (timer) window.clearInterval(timer);
      timer = null;
    }

    function applyPlaying(value) {
      isPlaying = Boolean(value);
      el.playBtn.textContent = isPlaying ? "pause" : "play";
      if (isPlaying) startTimer();
      else stopTimer();
    }

    async function loadAlbumFromEndpoint() {
      const albumUrl = el.albumUrl.value.trim();

      if (!albumUrl) {
        setStatus("Paste album link.", "error");
        return;
      }

      try {
        setStatus("Loading...");
        const response = await fetch(`${ALBUM_ENDPOINT}?url=${encodeURIComponent(albumUrl)}`);
        const data = await response.json();

        const loaded = normalizePhotoList(data.photos || []);
        if (!loaded.length) throw new Error("No photos found.");

        await setDoc(widgetRef, {
          photos: loaded,
          currentIndex: 0,
          isPlaying: true,
          albumUrl,
          updatedAt: serverTimestamp()
        }, { merge: true });

        setStatus("Album loaded.", "success");
      } catch (error) {
        setStatus(error.message, "error");
      }
    }

    el.loadAlbumBtn.addEventListener("click", loadAlbumFromEndpoint);
    el.nextBtn.addEventListener("click", () => pushIndex(index + 1));
    el.prevBtn.addEventListener("click", () => pushIndex(index - 1));
    el.playBtn.addEventListener("click", () => pushPlaying(!isPlaying));

    await ensureDocumentExists();

    onSnapshot(widgetRef, (snap) => {
      if (!snap.exists()) return;
      const data = snap.data();

      applyingRemoteUpdate = true;
      photos = normalizePhotoList(data.photos || []);
      index = data.currentIndex || 0;
      render(index);
      applyPlaying(data.isPlaying);
      applyingRemoteUpdate = false;
    });
  </script>
</body>
</html>
