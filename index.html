<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Google Photos Widget</title>
    <style>
        :root {
            --bg: #eef5ee;
            --panel: #dfeee2;
            --panel-dark: #9bb89f;
            --ink: #3f5c45;
            --accent: #b7d3b0;
            --cream: #f7fbf7;
            --shadow: #7c9a83;
            --error: #9d4b42;
            --success: #5f7f5f;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            width: 100%;
            min-height: 100%;
            background: transparent;
            font-family: "Courier New", Courier, monospace;
            color: var(--ink);
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .widget {
            width: min(100%, 390px);
            background: var(--bg);
            border: 6px solid var(--ink);
            box-shadow: 8px 8px 0 var(--shadow);
            padding: 14px;
        }

        .topbar {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 12px;
        }

        .title {
            font-size: 16px;
            font-weight: 900;
            letter-spacing: 0.5px;
            text-transform: lowercase;
            text-align: center;
        }

        .photo-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            background: var(--cream);
            border: 5px solid var(--panel-dark);
            overflow: hidden;
        }

        #slide {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .empty-state {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            text-align: center;
            padding: 22px;
            font-weight: 900;
            line-height: 1.45;
            background: var(--cream);
            z-index: 2;
        }

        .caption-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            min-height: 24px;
            font-size: 13px;
            font-weight: 900;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 0.5fr;
            gap: 8px;
            margin-top: 12px;
        }

        .pixel-btn {
            background: var(--accent);
            border: 3px solid var(--ink);
            color: var(--ink);
            font-family: inherit;
            font-weight: 900;
            padding: 7px 10px;
            cursor: pointer;
            box-shadow: 3px 3px 0 var(--shadow);
            border-radius: 0;
            transition: all 0.05s ease;
        }

        .pixel-btn:active {
            transform: translate(3px, 3px);
            box-shadow: none;
        }

        .pixel-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            font-size: 11px;
            line-height: 1.45;
            margin-top: 10px;
            font-weight: 900;
            text-align: center;
        }

        .status.error { color: var(--error); }
        .status.success { color: var(--success); }
        
        .widget-id-badge {
            font-size: 9px;
            text-align: center;
            margin-top: 8px;
            color: var(--panel-dark);
            letter-spacing: 0.5px;
        }
        
        .last-updated {
            font-size: 9px;
            text-align: center;
            margin-top: 4px;
            color: var(--panel-dark);
        }
    </style>
</head>
<body>
    <main class="widget">
        <section class="topbar">
            <div class="title">❦ momentos antes de bloquearnos ❦</div>
        </section>

        <section class="photo-wrap" aria-live="polite">
            <img id="slide" alt="Google Photos album image" />
            <div class="empty-state" id="emptyState">loading album ✿</div>
        </section>

        <section class="caption-row">
            <span id="caption">loading</span>
            <span id="counter">0/0</span>
        </section>

        <section class="controls">
            <button class="pixel-btn" id="prevBtn" type="button">◀ PREV</button>
            <button class="pixel-btn" id="nextBtn" type="button">NEXT ▶</button>
            <button class="pixel-btn" id="refreshBtn" type="button" title="Refresh album">⟳</button>
        </section>

        <div class="status" id="status"></div>
        <div class="widget-id-badge" id="widgetIdBadge"></div>
        <div class="last-updated" id="lastUpdated"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import {
            getFirestore,
            doc,
            getDoc,
            setDoc,
            updateDoc,
            onSnapshot,
            serverTimestamp
        } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

        // ============================================
        // CONFIGURATION - CHANGE THIS FOR EACH WIDGET!
        // ============================================
        const WIDGET_ID = "main";  // ← Change this for each widget (kitchen, bedroom, etc.)
        const ALBUM_URL = "https://photos.app.goo.gl/cTebSdwRbX3nb1rU7";
        // ============================================

        const firebaseConfig = {
            apiKey: "AIzaSyBH-JL6Y9LKN9oYy_lqUao6E_vh-kdawgU",
            authDomain: "slideshow-b78c0.firebaseapp.com",
            projectId: "slideshow-b78c0",
            storageBucket: "slideshow-b78c0.firebasestorage.app",
            messagingSenderId: "50555124539",
            appId: "1:50555124539:web:d240531a52bcd5ea60551e"
        };

        const ALBUM_ENDPOINT = "https://us-central1-slideshow-b78c0.cloudfunctions.net/googlePhotosAlbum";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const albumRef = doc(db, "photoAlbums", "mainAlbum");
        const widgetRef = doc(db, "photoWidgets", WIDGET_ID);

        // DOM elements
        const el = {
            status: document.getElementById("status"),
            slide: document.getElementById("slide"),
            emptyState: document.getElementById("emptyState"),
            caption: document.getElementById("caption"),
            counter: document.getElementById("counter"),
            prevBtn: document.getElementById("prevBtn"),
            nextBtn: document.getElementById("nextBtn"),
            refreshBtn: document.getElementById("refreshBtn"),
            widgetIdBadge: document.getElementById("widgetIdBadge"),
            lastUpdated: document.getElementById("lastUpdated")
        };

        // State
        let photos = [];
        let currentIndex = 0;
        let isUpdatingFromSync = false;
        let isFetchingAlbum = false;

        // Show widget ID
        el.widgetIdBadge.textContent = `widget: ${WIDGET_ID}`;

        function setStatus(message, type = "") {
            el.status.textContent = message;
            el.status.className = type ? `status ${type}` : "status";
            if (message && !type) {
                setTimeout(() => {
                    if (el.status.textContent === message) setStatus("");
                }, 3000);
            }
        }

        function normalizePhotoList(items) {
            if (!items || !items.length) return [];
            return items
                .map((item, index) => {
                    let url = "";
                    let caption = `fotito ${index + 1}`;
                    
                    if (typeof item === "string") {
                        url = item;
                        caption = `fotito ${index + 1}`;
                    } else if (typeof item === "object") {
                        url = item.url || "";
                        caption = item.caption || `fotito ${index + 1}`;
                    }
                    
                    return { url, caption };
                })
                .filter(item => item.url && item.url.startsWith("http") && !item.url.includes("undefined") && item.url.length > 20);
        }

        function safeIndex(index) {
            if (!photos.length) return 0;
            if (index < 0) return photos.length - 1;
            if (index >= photos.length) return 0;
            return index;
        }

        function formatTimeAgo(timestamp) {
            if (!timestamp) return 'never';
            const now = Date.now();
            const diff = now - timestamp;
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor(diff / (1000 * 60));
            
            if (hours < 1) return `${minutes} minutes ago`;
            if (hours === 1) return '1 hour ago';
            if (hours < 24) return `${hours} hours ago`;
            const days = Math.floor(hours / 24);
            return `${days} days ago`;
        }

        function updateDisplay() {
            if (!photos.length) {
                el.emptyState.style.display = "grid";
                el.emptyState.textContent = "no photos in album ✿";
                el.slide.removeAttribute("src");
                el.caption.textContent = "no album loaded";
                el.counter.textContent = "0/0";
                el.prevBtn.disabled = true;
                el.nextBtn.disabled = true;
                return;
            }

            el.prevBtn.disabled = false;
            el.nextBtn.disabled = false;
            
            const photo = photos[currentIndex];
            if (!photo || !photo.url) {
                console.error("Invalid photo at index", currentIndex, photo);
                return;
            }

            el.emptyState.style.display = "grid";
            el.emptyState.textContent = "loading photo ✿";

            let imageUrl = photo.url;
            if (!imageUrl.includes('=') && !imageUrl.includes('w1600')) {
                imageUrl = `${imageUrl}=w1600-h1600-no`;
            }

            const img = new Image();
            
            img.onload = () => {
                el.slide.src = imageUrl;
                el.emptyState.style.display = "none";
                el.caption.textContent = photo.caption;
                el.counter.textContent = `${currentIndex + 1}/${photos.length}`;
            };
            
            img.onerror = (error) => {
                console.error("Failed to load image:", imageUrl, error);
                el.emptyState.style.display = "grid";
                el.emptyState.textContent = "failed to load photo";
                setStatus("Photo failed to load", "error");
            };
            
            img.src = imageUrl;
        }

        async function updateWidgetIndex(newIndex) {
            if (!photos.length) return;
            if (isUpdatingFromSync) return;
            
            const targetIndex = safeIndex(newIndex);
            if (targetIndex === currentIndex) return;
            
            console.log(`[${WIDGET_ID}] Changing from ${currentIndex} to ${targetIndex}`);
            setStatus(`loading photo ${targetIndex + 1}...`, "success");
            
            try {
                await updateDoc(widgetRef, {
                    currentIndex: targetIndex,
                    updatedAt: serverTimestamp(),
                    lastUpdatedBy: WIDGET_ID
                });
            } catch (error) {
                console.error("Failed to update index:", error);
                setStatus("Failed to change photo", "error");
            }
        }

        async function ensureWidgetExists() {
            try {
                const snap = await getDoc(widgetRef);
                if (!snap.exists()) {
                    console.log(`Creating new widget: ${WIDGET_ID}`);
                    await setDoc(widgetRef, {
                        currentIndex: 0,
                        createdAt: serverTimestamp(),
                        updatedAt: serverTimestamp(),
                        widgetName: WIDGET_ID
                    });
                } else {
                    const data = snap.data();
                    if (data.currentIndex !== undefined) {
                        currentIndex = data.currentIndex;
                        console.log(`[${WIDGET_ID}] Loaded index: ${currentIndex}`);
                    }
                }
            } catch (error) {
                console.error("Error ensuring widget exists:", error);
            }
        }

        function getCacheAge(albumSnap) {
            if (!albumSnap.exists()) return { hours: 999, minutes: 999, isValid: false };
            const lastRefreshed = albumSnap.data().lastRefreshed || 0;
            const ageMs = Date.now() - lastRefreshed;
            const hours = ageMs / (1000 * 60 * 60);
            const minutes = ageMs / (1000 * 60);
            return { hours, minutes, lastRefreshed, isValid: lastRefreshed > 0 };
        }

        async function fetchAndStoreAlbum(forceRefresh = false) {
            if (isFetchingAlbum) return;
            
            // Check cache age
            const albumSnap = await getDoc(albumRef);
            const cacheAge = getCacheAge(albumSnap);
            
            // Show cache info
            if (albumSnap.exists() && albumSnap.data().photos && cacheAge.isValid) {
                const lastRefreshedDate = new Date(cacheAge.lastRefreshed);
                el.lastUpdated.textContent = `updated ${formatTimeAgo(cacheAge.lastRefreshed)}`;
                
                if (!forceRefresh && cacheAge.hours < 24) {
                    const hoursLeft = Math.floor(24 - cacheAge.hours);
                    setStatus(`📸 ${albumSnap.data().photos.length} photos (next refresh in ${hoursLeft}h)`, "success");
                    
                    if (photos.length === 0) {
                        photos = normalizePhotoList(albumSnap.data().photos || []);
                        updateDisplay();
                    }
                    return;
                }
            }
            
            // Refresh if cache is old or forced
            isFetchingAlbum = true;
            
            try {
                setStatus("refreshing album from Google Photos...");
                el.emptyState.style.display = "grid";
                el.emptyState.textContent = "fetching latest photos ✿";

                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 20000);

                const response = await fetch(
                    `${ALBUM_ENDPOINT}?url=${encodeURIComponent(ALBUM_URL)}&t=${Date.now()}`,
                    { 
                        signal: controller.signal,
                        headers: { 'Accept': 'application/json' }
                    }
                );

                clearTimeout(timeout);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                
                if (!data.photos || !data.photos.length) {
                    throw new Error("No photos found in album");
                }

                const loadedPhotos = normalizePhotoList(data.photos);
                
                if (!loadedPhotos.length) {
                    throw new Error("No valid photos found");
                }

                const refreshTime = Date.now();
                await setDoc(albumRef, {
                    photos: loadedPhotos,
                    albumUrl: ALBUM_URL,
                    lastRefreshed: refreshTime,
                    refreshedAt: serverTimestamp(),
                    totalPhotos: loadedPhotos.length,
                    nextRefresh: refreshTime + (24 * 60 * 60 * 1000)
                }, { merge: true });

                photos = loadedPhotos;
                el.lastUpdated.textContent = `updated just now`;
                setStatus(`✅ ${loadedPhotos.length} photos loaded!`, "success");
                updateDisplay();
                
            } catch (error) {
                console.error("Fetch error:", error);
                
                // Use cached data if available
                if (albumSnap.exists() && albumSnap.data().photos) {
                    photos = normalizePhotoList(albumSnap.data().photos || []);
                    updateDisplay();
                    setStatus(`⚠️ Using cached photos (${error.message})`, "error");
                } else {
                    setStatus(`Error: ${error.message}`, "error");
                    el.emptyState.style.display = "grid";
                    el.emptyState.textContent = "failed to load album";
                }
            } finally {
                isFetchingAlbum = false;
            }
        }

        // Button click handlers
        el.prevBtn.onclick = () => {
            console.log(`[${WIDGET_ID}] Prev button clicked`);
            updateWidgetIndex(currentIndex - 1);
        };
        
        el.nextBtn.onclick = () => {
            console.log(`[${WIDGET_ID}] Next button clicked`);
            updateWidgetIndex(currentIndex + 1);
        };
        
        el.refreshBtn.onclick = () => {
            console.log(`[${WIDGET_ID}] Manual refresh requested`);
            setStatus("Manually refreshing album...", "success");
            fetchAndStoreAlbum(true);
        };

        // Initialize and start listeners
        async function init() {
            console.log(`Initializing widget: ${WIDGET_ID}`);
            
            await ensureWidgetExists();
            
            // Listen for album changes
            onSnapshot(albumRef, (snap) => {
                if (snap.exists()) {
                    const newPhotos = normalizePhotoList(snap.data().photos || []);
                    if (JSON.stringify(photos) !== JSON.stringify(newPhotos)) {
                        console.log(`[${WIDGET_ID}] Album updated, ${newPhotos.length} photos`);
                        photos = newPhotos;
                        updateDisplay();
                    }
                    
                    // Update last refreshed display
                    const lastRefreshed = snap.data().lastRefreshed;
                    if (lastRefreshed) {
                        el.lastUpdated.textContent = `updated ${formatTimeAgo(lastRefreshed)}`;
                    }
                } else {
                    photos = [];
                    updateDisplay();
                }
            });
            
            // Listen for index changes
            onSnapshot(widgetRef, (snap) => {
                if (!snap.exists()) return;
                
                const data = snap.data();
                const newIndex = data.currentIndex;
                
                if (newIndex !== undefined && newIndex !== currentIndex) {
                    console.log(`[${WIDGET_ID}] Synced to photo ${newIndex + 1} from another viewer`);
                    isUpdatingFromSync = true;
                    currentIndex = newIndex;
                    updateDisplay();
                    setTimeout(() => { isUpdatingFromSync = false; }, 100);
                }
            });
            
            // Load album
            const albumSnap = await getDoc(albumRef);
            if (!albumSnap.exists() || !albumSnap.data().photos || albumSnap.data().photos.length === 0) {
                await fetchAndStoreAlbum();
            } else {
                photos = normalizePhotoList(albumSnap.data().photos || []);
                updateDisplay();
                // Check if refresh needed in background
                const lastRefreshed = albumSnap.data().lastRefreshed || 0;
                const hoursSinceRefresh = (Date.now() - lastRefreshed) / (1000 * 60 * 60);
                if (hoursSinceRefresh >= 24) {
                    fetchAndStoreAlbum();
                }
            }
        }
        
        // Start the app
        init().catch(console.error);
    </script>
</body>
</html>
